<!DOCTYPE html>
<html>

<head>

  <title>To Do List</title>

  <style>

    body {
      font-family: Arial;
      background-color: #f0f0f0;
      text-align: center;
      margin-top: 50px;
    }

    input {
      width: 200px;
      height: 35px;
      font-size: 16px;
    }

    button {
      height: 40px;
      font-size: 16px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: white;
      margin: 10px auto;
      padding: 10px;
      width: 250px;
      border-radius: 10px;
    }

  </style>

</head>

<body>

  <h1>My To Do List</h1>

  <input type="text" id="taskInput" placeholder="Write a task">

  <button onclick="addTask()">Add</button>

  <ul id="taskList"></ul>

  <script>

    function addTask() {

      let taskText = document.getElementById("taskInput").value;

      let li = document.createElement("li");

      li.innerText = taskText;

      document.getElementById("taskList").appendChild(li);

      document.getElementById("taskInput").value = "";

    }

  </script>

</body>

</html>

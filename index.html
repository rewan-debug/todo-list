<!DOCTYPE html>
<html>

<head>
  <title>Super To Do List</title>

  <style>

    body {
      font-family: Arial;
      background: linear-gradient(to right, #7f00ff, #e100ff);
      display: flex;
      justify-content: center;
      margin-top: 40px;
    }

    .box {
      background: white;
      width: 420px;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 0 20px gray;
    }

    h1 {
      text-align: center;
      color: purple;
    }

    .top {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid gray;
    }

    .add-btn {
      background: purple;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      background: #f3e5ff;
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .done {
      text-decoration: line-through;
      color: gray;
    }

    .buttons button {
      margin-left: 5px;
      border: none;
      padding: 6px 10px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .done-btn {
      background: green;
    }

    .delete-btn {
      background: red;
    }

    .clear-btn {
      width: 100%;
      margin-top: 15px;
      background: black;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    .counter {
      text-align: center;
      margin-top: 15px;
      color: purple;
      font-weight: bold;
    }

    .dark-btn {
      margin-bottom: 15px;
      background: #222;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
    }

    .dark-mode {
      background: #222;
      color: white;
    }

    .dark-mode li {
      background: #444;
    }

  </style>
</head>

<body>

  <div class="box" id="box">

    <button class="dark-btn" onclick="darkMode()">
      🌙 Dark Mode
    </button>

    <h1>📝 To Do List</h1>

    <div class="top">

      <input type="text" id="taskInput"
      placeholder="Enter task">

      <button class="add-btn"
      onclick="addTask()">
        Add
      </button>

    </div>

    <ul id="taskList"></ul>

    <div class="counter">
      Tasks:
      <span id="count">0</span>
    </div>

    <button class="clear-btn"
    onclick="clearTasks()">
      Clear All
    </button>

  </div>

  <script>

    let count = 0;

    function addTask() {

      let input =
      document.getElementById("taskInput");

      let task = input.value;

      if (task === "") {
        alert("Enter a task");
        return;
      }

      let li = document.createElement("li");

      let text = document.createElement("span");
      text.innerText = task;

      let buttons = document.createElement("div");
      buttons.className = "buttons";

      let doneBtn =
      document.createElement("button");

      doneBtn.innerText = "Done";
      doneBtn.className = "done-btn";

      doneBtn.onclick = function () {
        text.classList.toggle("done");
      };

      let deleteBtn =
      document.createElement("button");

      deleteBtn.innerText = "Delete";
      deleteBtn.className = "delete-btn";

      deleteBtn.onclick = function () {
        li.remove();
        count--;
        updateCount();
      };

      buttons.appendChild(doneBtn);
      buttons.appendChild(deleteBtn);

      li.appendChild(text);
      li.appendChild(buttons);

      document.getElementById("taskList")
      .appendChild(li);

      input.value = "";

      count++;

      updateCount();
    }

    function updateCount() {
      document.getElementById("count")
      .innerText = count;
    }

    function clearTasks() {

      document.getElementById("taskList")
      .innerHTML = "";

      count = 0;

      updateCount();
    }

    function darkMode() {

      document.getElementById("box")
      .classList.toggle("dark-mode");
    }

  </script>

</body>

</html>

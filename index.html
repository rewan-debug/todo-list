<!DOCTYPE html>
<html>
<head>
<title>Todo</title>

<style>

body{
font-family:Arial;
background:linear-gradient(to right,purple,pink);
display:flex;
justify-content:center;
margin-top:50px;
}

.box{
background:white;
padding:20px;
width:400px;
border-radius:20px;
}

input{
width:70%;
padding:10px;
}

button{
padding:10px;
background:purple;
color:white;
border:none;
}

li{
margin-top:10px;
background:#eee;
padding:10px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="box">

<h1>📝 To Do List</h1>

<input id="task">
<button onclick="addTask()">Add</button>

<ul id="list"></ul>

</div>

<script>

function addTask(){

let task =
document.getElementById("task").value;

let li =
document.createElement("li");

li.innerText = task;

document.getElementById("list")
.appendChild(li);

}

</script>

</body>
</html>

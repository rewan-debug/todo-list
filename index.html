<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>To Do List</title>

  <style>

    body {
      font-family: Arial;
      background: #f4d9ff;
      display: flex;
      justify-content: center;
      margin-top: 60px;
    }

    .todo-box {
      background: white;
      width: 400px;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 0 15px gray;
    }

    h1 {
      text-align: center;
      color: purple;
    }

    .input-area {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    .add {
      background: purple;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 15px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      background: #f7edff;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .done {
      text-decoration: line-through;
      color: gray;
    }

    .btns button {
      border: none;
      padding: 6px 10px;
      margin-left: 5px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .done-btn {
      background: green;
    }

    .delete-btn {
      background: red;
    }

    .counter {
      margin-top: 15px;
      text-align: center;
      color: purple;
      font-weight: bold;
    }

  </style>
</head>

<body>

  <div class="todo-box">

    <h1>📝 To Do List</h1>

    <div class="input-area">
      <input type="text" id="taskInput" placeholder="Add a task">
      <button class="add" onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>

    <div class="counter">
      Total Tasks:
      <span id="count">0</span>
    </div>

  </div>

  <script>

    let count = 0;

    function addTask() {

      let input = document.getElementById("taskInput");

      let task = input.value;

      if (task === "") {
        alert("Write a task first");
        return;
      }

      let li = document.createElement("li");

      let text = document.createElement("span");
      text.innerText = task;

      let btns = document.createElement("div");
      btns.className = "btns";

      let doneBtn = document.createElement("button");
      doneBtn.innerText = "Done";
      doneBtn.className = "done-btn";

      doneBtn.onclick = function () {
        text.classList.toggle("done");
      };

      let deleteBtn = document.createElement("button");
      deleteBtn.innerText = "Delete";
      deleteBtn.className = "delete-btn";

      deleteBtn.onclick = function () {
        li.remove();
        count--;
        updateCount();
      };

      btns.appendChild(doneBtn);
      btns.appendChild(deleteBtn);

      li.appendChild(text);
      li.appendChild(btns);

      document.getElementById("taskList").appendChild(li);

      input.value = "";

      count++;

      updateCount();
    }

    function updateCount() {
      document.getElementById("count").innerText = count;
    }

  </script>

</body>

</html>

<!DOCTYPE html>
<html>
<head>
  <title>To Do List</title>

  <style>
    body{
      font-family: Arial;
      background: linear-gradient(to right, #d9a7ff, #fffcdc);
      text-align: center;
      margin-top: 50px;
    }

    .box{
      background: white;
      width: 350px;
      margin: auto;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 0 10px gray;
    }

    h1{
      color: purple;
    }

    input{
      padding: 10px;
      width: 70%;
      border-radius: 10px;
      border: 1px solid gray;
    }

    button{
      padding: 10px;
      border: none;
      border-radius: 10px;
      background-color: purple;
      color: white;
      cursor: pointer;
    }

    li{
      text-align: left;
      margin-top: 10px;
      font-size: 18px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>To Do List 📝</h1>

    <input type="text" id="task">
    <button onclick="addTask()">Add</button>

    <ul id="list"></ul>
  </div>

  <script>
    function addTask(){
      let task = document.getElementById("task").value;

      let li = document.createElement("li");
      li.innerText = task;

      document.getElementById("list").appendChild(li);

      document.getElementById("task").value = "";
    }
  </script>

</body>
</html>
